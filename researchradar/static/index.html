<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ResearchRadar</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260430-fixed-sidebar" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
          displayMath: [
            ["$$", "$$"],
            ["\\[", "\\]"],
          ],
          processEscapes: true,
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
        },
        startup: {
          ready() {
            MathJax.startup.defaultReady();
            window.dispatchEvent(new Event("mathjax-ready"));
          },
        },
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  </head>
  <body>
    <div class="app">
      <aside id="navSidebar" class="sidebar">
        <div class="brand">
          <div class="brand-mark">RR</div>
          <div>
            <h1>ResearchRadar</h1>
            <p id="serverLine">连接中</p>
          </div>
        </div>

        <label class="field-label" for="profileSelect">研究画像</label>
        <select id="profileSelect"></select>

        <nav class="nav">
          <button class="nav-item active" data-view="digest">个性日报</button>
          <button class="nav-item" data-view="arxiv">每日 arXiv</button>
          <button class="nav-item" data-view="blogs">博客与实验室</button>
          <button class="nav-item" data-view="radar">全量雷达</button>
          <button class="nav-item" data-view="sources">信息源</button>
          <button class="nav-item" data-view="notes">知识库</button>
        </nav>

        <div class="ops">
          <button id="crawl1">抓取今天</button>
          <button id="crawl14">回填 14 天</button>
          <button id="crawl30">回填 30 天</button>
        </div>
      </aside>
      <main class="main">
        <section class="topbar">
          <div class="stat">
            <span class="stat-label">条目</span>
            <strong id="itemCount">0</strong>
          </div>
          <div class="stat">
            <span class="stat-label">来源</span>
            <strong id="sourceCount">0</strong>
          </div>
          <div class="stat wide">
            <span class="stat-label">抓取器</span>
            <strong id="crawlerStatus">idle</strong>
          </div>
          <div class="search">
            <input id="searchInput" placeholder="搜索标题 / 摘要 / 标签" />
            <button id="searchBtn">搜索</button>
          </div>
        </section>

        <section id="view-digest" class="view active">
          <div class="section-head">
            <div>
              <h2>个性日报</h2>
              <p id="digestMeta">按你的研究画像排序</p>
            </div>
            <select id="digestDays">
              <option value="3">近 3 天</option>
              <option value="7" selected>近 7 天</option>
              <option value="14">近 14 天</option>
              <option value="30">近 30 天</option>
            </select>
          </div>
          <div id="digestList" class="item-list"></div>
        </section>

        <section id="view-arxiv" class="view">
          <div class="section-head">
            <div>
              <h2>每日 arXiv</h2>
              <p id="arxivMeta">当天更新的 AI / ML / Agent 论文</p>
            </div>
            <div class="date-controls">
              <select id="arxivDate"></select>
              <span id="arxivCount" class="muted"></span>
            </div>
          </div>
          <div id="arxivList" class="item-list"></div>
          <button id="arxivMore" class="load-more hidden">加载更多</button>
        </section>

        <section id="view-radar" class="view">
          <div class="section-head">
            <div>
              <h2>全量雷达</h2>
              <p>论文、博客、代码和社区讨论的统一池</p>
            </div>
            <div class="filters">
              <select id="typeFilter">
                <option value="">全部类型</option>
                <option value="paper">论文</option>
                <option value="blog">博客</option>
                <option value="repo">代码</option>
                <option value="discussion">讨论</option>
                <option value="cn_community">中文源</option>
              </select>
              <select id="daysFilter">
                <option value="7">近 7 天</option>
                <option value="14" selected>近 14 天</option>
                <option value="30">近 30 天</option>
              </select>
            </div>
          </div>
          <div id="radarList" class="item-list"></div>
          <button id="radarMore" class="load-more hidden">加载更多</button>
        </section>

        <section id="view-blogs" class="view">
          <div class="section-head">
            <div>
              <h2>博客与实验室</h2>
              <p>公司与实验室官方动态</p>
            </div>
            <div class="date-controls">
              <select id="blogDate"></select>
              <span id="blogCount" class="muted"></span>
            </div>
          </div>
          <div id="blogList" class="item-list"></div>
          <button id="blogMore" class="load-more hidden">加载更多</button>
        </section>

        <section id="view-sources" class="view">
          <div class="section-head">
            <div>
              <h2>信息源</h2>
              <p>最近一次抓取状态</p>
            </div>
          </div>
          <div id="sourceTable" class="source-table"></div>
        </section>

        <section id="view-notes" class="view">
          <div class="section-head">
            <div>
              <h2>知识库</h2>
              <p>画像、图谱、收藏、问答和笔记的长期沉淀</p>
            </div>
          </div>
          <div id="knowledgeStats" class="knowledge-stats"></div>
          <div id="knowledgeProfile" class="knowledge-profile"></div>
          <div class="subhead">
            <h3>知识图谱</h3>
            <span id="knowledgeGraphMeta" class="muted">基于看过、收藏、问答和笔记生成</span>
          </div>
          <div class="graph-shell">
            <canvas id="knowledgeGraph" width="980" height="560"></canvas>
          </div>
          <div class="knowledge-columns">
            <section>
              <div class="subhead">
                <h3>收藏 / 深读</h3>
                <span class="muted">下一步阅读队列</span>
              </div>
              <div id="knowledgeQueue" class="compact-list"></div>
            </section>
            <section>
              <div class="subhead">
                <h3>最近问答</h3>
                <span class="muted">可沉淀为笔记的上下文</span>
              </div>
              <div id="conversationList" class="compact-list"></div>
            </section>
          </div>
          <div class="subhead notes-head">
            <h3>知识笔记</h3>
            <span class="muted">手动记录和保存的回答</span>
          </div>
          <div id="notesList" class="notes"></div>
        </section>
      </main>

      <aside id="detailPane" class="detail">
        <div id="detailEmpty" class="empty-state">
          选择一条内容后查看证据卡片和追问。
        </div>
        <div id="detailPanel" class="detail-panel hidden">
          <div class="detail-top">
            <span id="detailType" class="pill"></span>
            <span id="detailSource" class="muted"></span>
          </div>
          <h2 id="detailTitle"></h2>
          <div id="detailSummary" class="rich-text markdown-body"></div>
          <div id="detailTags" class="tags"></div>
          <div id="detailReasons" class="detail-section hidden"></div>
          <div id="detailFacts" class="evidence-grid"></div>
          <div id="detailLinks" class="detail-links"></div>
          <div id="detailStatus" class="status-line"></div>
          <div class="detail-actions">
            <a id="detailLink" target="_blank" rel="noreferrer">打开来源</a>
            <button data-action="like" class="feedback">有用</button>
            <button data-action="save" class="feedback">收藏</button>
            <button data-action="deep_read" class="feedback">深读</button>
            <button data-action="ignore" class="feedback ghost">忽略</button>
          </div>
          <div class="chat">
            <h3>研究追问</h3>
            <textarea id="chatQuestion" rows="4" placeholder="例如：这和我的 agent memory / future prediction 方向有什么关系？"></textarea>
            <label class="checkbox">
              <input type="checkbox" id="saveNote" />
              <span>保存回答为知识笔记</span>
            </label>
            <button id="askBtn">提问</button>
            <div id="chatAnswer" class="answer rich-text markdown-body"></div>
          </div>
          <div class="note-composer">
            <h3>条目笔记</h3>
            <input id="noteTitle" placeholder="笔记标题" />
            <textarea id="itemNote" rows="4" placeholder="记录你的判断、待读理由、实验想法或引用线索"></textarea>
            <div class="note-row">
              <select id="noteImportance">
                <option value="3">重要性 3</option>
                <option value="4">重要性 4</option>
                <option value="5">重要性 5</option>
                <option value="2">重要性 2</option>
                <option value="1">重要性 1</option>
              </select>
              <button id="saveItemNote">保存笔记</button>
            </div>
          </div>
        </div>
      </aside>
    </div>
    <div id="toast" class="toast hidden"></div>

    <script src="/static/app.js?v=20260430-openai-api"></script>
  </body>
</html>
