server:
  host: "0.0.0.0"
  port: 8765

crawl:
  timezone: "Asia/Shanghai"
  # arXiv announces new submissions around 20:00 US Eastern on announcement days.
  daily_time_timezone: "America/New_York"
  daily_time: "20:10"
  initial_backfill_days: 14
  request_timeout_seconds: 25
  max_items_per_source: 80
  source_gap_repair_days: 10
  source_gap_repair_min_items: 20
  arxiv_page_size: 200
  arxiv_max_results_per_run: 1500
  user_agent: "ResearchRadar/0.1 (+local personal research agent)"

ranking:
  digest_max_items: 36
  digest_min_items_per_section: 4
  full_radar_days_default: 14

github:
  enabled: true
  daily_rank_url: "https://github.com/OpenGithubs/github-daily-rank"
  daily_rank_branch: "main"
  trending_url: "https://github.com/trending"

hackernews:
  enabled: true
  keywords:
    - "LLM"
    - "agent"
    - "AI"
    - "machine learning"
    - "OpenAI"
    - "Anthropic"
    - "Qwen"

llm:
  provider: "openai"
  wire_api: "responses"
  model_env: "OPENAI_MODEL"
  api_key_env: "OPENAI_API_KEY"
  base_url_env: "OPENAI_BASE_URL"
  fallback_api_key_envs:
    - "HAOXIANG_API_KEY"
  fallback_base_url_envs:
    - "HAOXIANG_BASE_URL"
  default_base_url: "https://api.openai.com"
  default_model: "gpt-5.5"
  reasoning_effort: "xhigh"
  disable_response_storage: true
  chat_timeout_seconds: 90
  request_timeout_seconds: 75
  max_model_attempts: 1
  max_output_tokens: 4096

llm_postprocess:
  enabled: true
  model: "gpt-5.5"
  pipeline_version: "gpt55-v1"
  days: 3
  max_items_per_run: 80
  prefilter_batch_size: 12
  analysis_batch_size: 6
  min_ai_confidence: 0.55

jina:
  api_key_env: "JINA_API_KEY"
  reader_url: "https://r.jina.ai/http://"
  max_chars: 5000
  timeout_seconds: 6

serper:
  api_key_env: "SERPER_API_KEY"
  search_url: "https://google.serper.dev/search"
  default_results: 8
